version: 2

models:
  - name: dim_tranche_age
    description: "Référentiel des tranches d'âge INSEE avec libellés et flag population active (15-64 ans)."
    columns:
      - name: code_tranche_age
        tests: [not_null, unique]
      - name: libelle_tranche_age
        tests: [not_null]
      - name: est_population_active
        description: "TRUE pour Y15T24, Y25T54, Y55T64 — utilisé pour filtrer la population active"

  - name: dim_territoire
    description: "Référentiel géographique : un enregistrement par département."
    columns:
      - name: code_departement
        tests: [not_null, unique]
      - name: departement
        tests: [not_null]
      - name: region
        tests: [not_null]

  - name: mart_territoire
    description: "Snapshot du marché du travail à la dernière période disponible, par département."
    columns:
      - name: code_departement
        tests: [not_null, unique]
      - name: taux_chomage_indemnise
        description: "Taux de chômage indemnisé en %"
      - name: nb_offres_dernier_mois
        description: "Nombre d'offres collectées sur le dernier mois disponible"

  - name: mart_desequilibre_emploi
    description: "Score mensuel de déséquilibre territorial. Score élevé = territoire sous tension."
    columns:
      - name: annee_mois
        tests: [not_null]
      - name: code_departement
        tests: [not_null]
      - name: score_desequilibre
        description: "ratio_demandeurs_offres * (1 + taux_chomage/100)"
      - name: ratio_demandeurs_offres
        description: "nb_alloc / nb_offres"

  - name: mart_evolution_temporelle
    description: "Série temporelle mensuelle par département avec variation M/M-1 des allocataires."
    columns:
      - name: annee_mois
        tests: [not_null]
      - name: code_departement
        tests: [not_null]
      - name: evolution_alloc_pct
        description: "Évolution en % du nombre d'allocataires vs mois précédent"
