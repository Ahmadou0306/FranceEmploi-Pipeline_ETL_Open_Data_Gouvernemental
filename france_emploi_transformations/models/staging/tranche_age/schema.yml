version: 2

models:
  - name: tranche_age
    description: "Population par sexe, tranche d'âge et département, issue du Recensement de la Population."
    columns:
      - name: time_period
        description: "Année de référence"
        tests:
          - not_null
      - name: geo
        description: "Code géographique (département)"
        tests:
          - not_null
      - name: age
        description: "Tranche d'âge (Y_LT15, Y15T24, Y25T54, Y55T64, Y_GE65)"
        tests:
          - not_null
          - accepted_values:
              values: ["Y_LT15", "Y15T24", "Y25T54", "Y55T64", "Y_GE65"]
      - name: sex
        description: "Sexe (M, F, T)"
        tests:
          - not_null
          - accepted_values:
              values: ["M", "F", "T"]
      - name: rp_measure
        description: "Mesure du recensement"
        tests:
          - not_null
      - name: obs_value_niveau
        description: "Valeur observée (population)"
        tests:
          - not_null
