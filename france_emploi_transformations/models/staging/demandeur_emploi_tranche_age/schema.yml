version: 2

models:
  - name: demandeur_emploi_tranche_age
    description: "Demandeurs d'emploi (DEFM) par tranche d'âge et catégorie, données mensuelles nationales."
    columns:
      - name: date
        description: "Date de référence"
        tests:
          - not_null
      - name: age_detaille
        description: "Tranche d'âge détaillée"
        tests:
          - not_null
      - name: categorie
        description: "Catégorie de demandeur d'emploi (A, B, C...)"
        tests:
          - not_null
          - accepted_values:
              values: ["A", "B", "C", "D", "E", "ABC"]
      - name: nombre_de_demandeurs_d_emploi
        description: "Nombre de demandeurs d'emploi inscrits"
        tests:
          - not_null
      - name: champ
        description: "Champ géographique"
      - name: type_de_donnees
        description: "Type de données (CVS, brut...)"
