version: 2

models:
  - name: chomeurs_indemnises
    description: "Indicateurs mensuels de l'assurance chômage par département, après typage et nettoyage depuis la couche raw."
    columns:
      - name: annee_mois
        description: "Mois de référence (premier jour du mois)"
        tests:
          - not_null
      - name: code_departement
        description: "Code INSEE du département"
        tests:
          - not_null
      - name: departement
        description: "Libellé du département"
        tests:
          - not_null
      - name: region
        description: "Libellé de la région"
        tests:
          - not_null
      - name: nb_alloc
        description: "Nombre d'allocataires"
        tests:
          - not_null
      - name: nb_indemnises
        description: "Nombre d'indemnisés"
        tests:
          - not_null
      - name: aj_moy
        description: "Allocation journalière moyenne (€)"
      - name: depense
        description: "Dépenses totales d'indemnisation (€)"
      - name: duree_moy
        description: "Durée moyenne d'indemnisation (jours)"
      - name: nb_od
        description: "Nombre d'ouvertures de droits"
      - name: nb_reprises
        description: "Nombre de reprises d'emploi"
