version: 2

models:
  - name: offres_emploi_france_travail
    description: "Offres d'emploi collectées par France Travail, par département, type de contrat et qualification."
    columns:
      - name: date
        description: "Date de référence"
        tests:
          - not_null
      - name: code_departement
        description: "Code INSEE du département"
        tests:
          - not_null
      - name: departement
        description: "Libellé du département"
        tests:
          - not_null
      - name: code_region
        description: "Code de la région"
      - name: region
        description: "Libellé de la région"
      - name: nombre_d_offres_d_emploi
        description: "Nombre d'offres d'emploi"
        tests:
          - not_null
      - name: type_d_offre_d_emploi
        description: "Type d'offre (collectée / satisfaite)"
        tests:
          - not_null
          - accepted_values:
              values: ["Offres collectées", "Offres satisfaites"]
      - name: type_d_emploi
        description: "Type d'emploi (durable, temporaire, occasionnel)"
        tests:
          - accepted_values:
              values: ["Emploi durable", "Emploi temporaire", "Emploi occasionnel"]
      - name: qualification
        description: "Niveau de qualification requis"
      - name: type_de_donnees
        description: "Type de données (CVS, brut...)"
